<style>
:root{--bg:#F7F6F1;--surface:#FFFFFF;--ink:#262B38;--ink2:#5A6072;--accent:#2E4E86;--shu:#C0392F;--line:#E3E1D8}
@media (prefers-color-scheme: dark){:root{--bg:#1C1F27;--surface:#262B38;--ink:#EDEBE4;--ink2:#A8ADBD;--accent:#8FA9D6;--shu:#E07B72;--line:#3A4152}}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:36px 28px;
  max-width:360px;width:100%;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.bros{font-size:32px;letter-spacing:6px;margin-bottom:12px}
h1{font-size:20px;font-weight:600;margin-bottom:6px}
.sub{font-size:13px;color:var(--ink2);margin-bottom:24px}
input{width:100%;padding:12px 14px;font-size:16px;border:1px solid var(--line);border-radius:10px;
  background:var(--bg);color:var(--ink);font-family:inherit;text-align:center;letter-spacing:2px}
input:focus{outline:2px solid var(--accent);border-color:transparent}
button{width:100%;margin-top:14px;padding:13px;font-size:16px;font-weight:600;border:none;border-radius:10px;
  background:var(--accent);color:#fff;font-family:inherit;cursor:pointer}
button:disabled{opacity:.5}
.err{color:var(--shu);font-size:13px;margin-top:12px;min-height:1.4em}
.wait{font-size:14px;color:var(--ink2)}
#form{display:none}
</style>
</head>

const PKEY="dojo-pass";
const $=id=>document.getElementById(id);
function b64(s){const b=atob(s),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a}
async function decrypt(pass){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(pass),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(SALT),iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(IV)},key,b64(DATA));
  const st=new Blob([pt]).stream().pipeThrough(new DecompressionStream("gzip"));
  return await new Response(st).text();
}
function launch(html){document.open();document.write(html);document.close()}
function showForm(msg){$("splash").style.display="none";$("form").style.display="block";$("err").textContent=msg||"";$("pw").focus()}
async function tryPass(pass,remember){
  const html=await decrypt(pass);
  if(remember){try{localStorage.setItem(PKEY,pass)}catch(e){}}
  launch(html);
}
$("go").addEventListener("click",async()=>{
  const p=$("pw").value.trim();
  if(!p){$("err").textContent="あいことばを入れてください";return}
  $("go").disabled=true;$("err").textContent="確認中…";
  try{await tryPass(p,true)}
  catch(e){$("go").disabled=false;$("err").textContent="あいことばが違うようです"}
});
$("pw").addEventListener("keydown",e=>{if(e.key==="Enter")$("go").click()});
(async()=>{
  if(!window.crypto||!crypto.subtle||typeof DecompressionStream==="undefined"){
    $("splash").textContent="この端末のOS/ブラウザが古いようです。アップデートしてから開いてください。";return}
  let saved=null;try{saved=localStorage.getItem(PKEY)}catch(e){}
  if(saved){try{await tryPass(saved,false);return}catch(e){try{localStorage.removeItem(PKEY)}catch(_){}}}
  showForm();
})();
})();
</script>
